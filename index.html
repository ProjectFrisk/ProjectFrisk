<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Frisk</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: moveBlobs 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #ff007f, #6b00ff);
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            bottom: -50px;
            right: -100px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Container */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Typography */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        p {
            font-size: 1.1rem;
            color: #a1a1aa;
            margin-bottom: 40px;
        }

        /* Pulsing Glow Button */
        .btn-start {
            display: inline-block;
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #6b00ff, #ff007f);
            border: none;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: pulseGlow 2s infinite;
        }

        .btn-start:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #7b1aff, #ff1a8c);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(107, 0, 255, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 127, 0.7); }
            100% { box-shadow: 0 0 15px rgba(107, 0, 255, 0.4); }
        }

        /* Footer & Social Icons */
        footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .social-icons {
            display: flex;
            gap: 30px;
        }

        .social-icons a {
            color: #a1a1aa;
            font-size: 1.8rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        /* Neon Hover Effects for Icons */
        .social-icons a.discord:hover {
            color: #5865F2;
            transform: translateY(-5px);
            filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.8));
        }

        .social-icons a.youtube:hover {
            color: #FF0000;
            transform: translateY(-5px);
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8));
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <h1>Project Frisk</h1>
        <p>Unlock the full potential of your device.</p>
        
        <a href="#setup" class="btn-start">Get Started</a>

        <footer>
            <div class="social-icons">
                <a href="YOUR_DISCORD_LINK" target="_blank" class="discord" aria-label="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="YOUR_YOUTUBE_LINK" target="_blank" class="youtube" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
        </footer>
    </div>

</body>
</html>
