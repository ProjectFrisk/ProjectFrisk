<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Frisk</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Retro Pixel Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <!-- Google AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8693042848647942" crossorigin="anonymous"></script>
    
    <style>
        /* Base Reset & Retro Defaults */
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
        }

        /* Decorative Background Pixel Noise */
        .pixel-bg-element { position: absolute; background: #222222; width: 12px; height: 12px; z-index: 0; opacity: 0.7; }
        .p1 { top: 15%; left: 10%; box-shadow: 24px 12px #111, -12px 36px #222; }
        .p2 { top: 75%; left: 15%; box-shadow: 12px -24px #333, 48px 12px #111; }
        .p3 { top: 25%; right: 12%; box-shadow: -36px 48px #222, 12px 12px #333; }
        .p4 { bottom: 20%; right: 20%; box-shadow: -24px -12px #111; }

        /* Retro RPG Main Panel */
        .retro-card {
            position: relative; z-index: 1; background: #000000; border: 4px solid #ffffff;
            padding: 40px 24px; text-align: center; width: 92%; max-width: 480px;
            max-height: 95vh; overflow-y: auto; box-shadow: 0 0 0 4px #000000, 0 20px 40px rgba(0,0,0,0.8);
        }
        .retro-card::-webkit-scrollbar { display: none; }

        /* Inline SVG Pixel Hearts Logo Group */
        .logo-hearts-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .pixel-heart { shape-rendering: crispEdges; transition: transform 0.2s ease; }
        .retro-card:hover .pixel-heart { transform: scale(1.05); }
        .heart-yellow { color: #d4b100; filter: drop-shadow(0 0 4px rgba(212,177,0,0.5)); }
        .heart-red { color: #e60000; filter: drop-shadow(0 0 4px rgba(230,0,0,0.5)); }
        .heart-purple { color: #8000ff; filter: drop-shadow(0 0 4px rgba(128,0,255,0.5)); }

        /* Typography */
        h1 { font-family: 'Press Start 2P', monospace; font-size: 1.6rem; line-height: 1.4; margin-bottom: 8px; color: #ffffff; letter-spacing: -1px; }
        .subtitle { font-family: 'Press Start 2P', monospace; font-size: 0.8rem; color: #bcbcbc; margin-bottom: 35px; text-transform: uppercase; }
        h2 { font-family: 'Press Start 2P', monospace; font-size: 1.3rem; margin-bottom: 15px; color: #ffffff; }
        p { color: #bcbcbc; margin-bottom: 25px; line-height: 1.4; }

        /* Retro Navigation Cards */
        .cards-container { display: flex; flex-direction: column; gap: 16px; margin: 10px 0 25px 0; }
        .nav-card {
            display: flex; align-items: center; background: #000000; border: 3px solid #555555;
            padding: 16px; text-decoration: none; color: #ffffff; text-align: left;
            transition: all 0.2s steps(4); cursor: pointer;
        }
        .nav-card:hover { border-color: #ffffff; background: #111111; transform: translateY(-2px); }
        .nav-card-icon, .nav-card-img { width: 44px; height: 44px; background: #222222; border: 2px solid #555555; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; flex-shrink: 0; }
        .nav-card-img { object-fit: contain; }
        .nav-card:hover .nav-card-icon, .nav-card:hover .nav-card-img { background: #ffffff; color: #000000; border-color: #ffffff; }
        .nav-card-info { flex-grow: 1; padding: 0 14px; }
        .nav-card-info h3 { font-family: 'Press Start 2P', monospace; font-size: 0.85rem; margin-bottom: 5px; color: #ffffff; line-height: 1.3; }
        .nav-card-info p { font-size: 1.1rem; color: #bcbcbc; margin-bottom: 0; line-height: 1.3; }
        .nav-card-arrow { color: #555555; font-size: 0.9rem; transition: all 0.2s; }
        .nav-card:hover .nav-card-arrow { color: #ffffff; transform: translateX(2px); }

        /* Back Navigation Link */
        .btn-back { background: transparent; color: #bcbcbc; border: none; font-family: 'Press Start 2P', monospace; font-size: 0.75rem; text-decoration: none; cursor: pointer; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { color: #ffff00; }

        /* Tutorial/Instruction Container */
        .tutorial-box { background: #000000; border: 3px dashed #555555; padding: 20px; text-align: left; margin-top: 15px; }
        .tutorial-box h3 { font-family: 'Press Start 2P', monospace; font-size: 0.85rem; margin-bottom: 15px; color: #ffff00; text-align: center; }
        .tutorial-box ol { color: #bcbcbc; padding-left: 20px; line-height: 1.6; }
        .tutorial-box li span { color: #ffffff; font-weight: bold; text-decoration: underline; }

        footer { margin-top: 25px; border-top: 2px dashed #333333; padding-top: 20px; }
        .footer-note { font-family: 'Press Start 2P', monospace; font-size: 0.65rem; color: #555555; margin-bottom: 15px; }
        .social-icons { display: flex; justify-content: center; gap: 25px; }
        .social-icons a { color: #bcbcbc; font-size: 1.5rem; transition: color 0.1s ease; }
        .social-icons a:hover { color: #ffffff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="pixel-bg-element p1"></div>
    <div class="pixel-bg-element p2"></div>
    <div class="pixel-bg-element p3"></div>
    <div class="pixel-bg-element p4"></div>

    <!-- VIEW 1: HOME -->
    <div id="view-home" class="retro-card">
        <h1>Project Frisk</h1>
        <div class="subtitle">iOS Sideloader</div>
        <div class="cards-container">
            <a href="#dns" class="nav-card"><div class="nav-card-icon"><i class="fa-solid fa-shield-halved"></i></div><div class="nav-card-info"><h3>DNS Setup</h3><p>Block Apple's revoke servers.</p></div></a>
            <a href="#esign" class="nav-card"><div class="nav-card-icon"><i class="fa-solid fa-pen-nib"></i></div><div class="nav-card-info"><h3>ESign Install</h3><p>Code-signing access.</p></div></a>
            <a href="#apps" class="nav-card"><div class="nav-card-icon"><i class="fa-solid fa-mobile-screen"></i></div><div class="nav-card-info"><h3>IPA Library</h3><p>Tweaked apps.</p></div></a>
            <a href="#sign" class="nav-card"><div class="nav-card-icon"><i class="fa-solid fa-signature"></i></div><div class="nav-card-info"><h3>Sign IPA</h3><p>Automated cloud signing.</p></div></a>
        </div>
    </div>

    <!-- VIEW 2: DNS -->
    <div id="view-dns" class="retro-card hidden">
        <a href="#home" class="btn-back"><i class="fa-solid fa-arrow-left"></i> [ Back ]</a>
        <h2>DNS Setup</h2>
        <button onclick="window.open('https://github.com/char843vvv/qstaticdns/releases/download/dns/qstaticdns.mobileconfig', '_blank')" style="width: 100%; padding: 15px; background: #222; color: #fff; border: 3px solid #555; font-family: 'Press Start 2P', monospace; cursor: pointer;">INSTALL PROFILE</button>
    </div>

    <!-- VIEW 3: ESIGN -->
    <div id="view-esign" class="retro-card hidden">
        <a href="#home" class="btn-back"><i class="fa-solid fa-arrow-left"></i> [ Back ]</a>
        <h2>ESign Install</h2>
        <div class="cards-container">
            <!-- ESign list items here -->
        </div>
    </div>

    <!-- VIEW 4: APPS -->
    <div id="view-apps" class="retro-card hidden">
        <a href="#home" class="btn-back"><i class="fa-solid fa-arrow-left"></i> [ Back ]</a>
        <h2>IPA Library</h2>
        <div class="cards-container">
            <div class="nav-card" onclick="copyIpaLink(this, 'https://file.ipaomtk.com/Spotify/Spotify-2-IPAOMTK.COM.ipa')">
                <div class="nav-card-info"><h3>Spotify+++</h3><p>Premium Unlocked</p></div>
                <div class="nav-card-arrow status-icon"><i class="fa-regular fa-copy"></i></div>
            </div>
        </div>
    </div>

    <!-- VIEW 5: SIGN IPA -->
    <div id="view-sign" class="retro-card hidden">
        <a href="#home" class="btn-back"><i class="fa-solid fa-arrow-left"></i> [ Back ]</a>
        <h2>Sign IPA</h2>
        <input type="text" id="ipaUrl" placeholder="IPA Download URL" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #555;">
        <input type="password" id="p12Pass" placeholder="P12 Password" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #555;">
        <button onclick="startSigning()" style="width: 100%; padding: 15px; background: #fff; color: #000; font-family: 'Press Start 2P'; cursor: pointer;">START SIGNING</button>
    </div>

    <script>
        function copyIpaLink(element, url) {
            navigator.clipboard.writeText(url).then(() => {
                const iconDiv = element.querySelector('.status-icon');
                const originalHTML = iconDiv.innerHTML;
                iconDiv.innerHTML = '<i class="fa-solid fa-check" style="color: #55ff55;"></i>';
                setTimeout(() => { iconDiv.innerHTML = originalHTML; }, 1500);
            });
        }

        async function startSigning() {
            const OWNER = "ProjectFrisk";
            const REPO = "ProjectFrisk";
            const TOKEN = "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";
            const WORKFLOW_ID = "sign.yml";

            const ipaUrl = document.getElementById('ipaUrl').value;
            const p12Pass = document.getElementById('p12Pass').value;

            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { ipa_url: ipaUrl, password: p12Pass, p12_base64: "PLACEHOLDER", mobileprovision_base64: "PLACEHOLDER" }
                })
            });

            if (response.ok) alert("Signing started!");
            else alert("Error triggering workflow.");
        }

        function handleRouting() {
            const hash = window.location.hash;
            const views = [document.getElementById('view-home'), document.getElementById('view-dns'), document.getElementById('view-esign'), document.getElementById('view-apps'), document.getElementById('view-sign')];
            views.forEach(v => v.classList.add('hidden'));
            
            if (hash === '#dns') document.getElementById('view-dns').classList.remove('hidden');
            else if (hash === '#esign') document.getElementById('view-esign').classList.remove('hidden');
            else if (hash === '#apps') document.getElementById('view-apps').classList.remove('hidden');
            else if (hash === '#sign') document.getElementById('view-sign').classList.remove('hidden');
            else document.getElementById('view-home').classList.remove('hidden');
        }

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', handleRouting);
    </script>
</body>
</html>
